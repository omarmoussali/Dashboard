<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Omar's Dashboard</title>
<script src="lock.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger: #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
}
body {
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(60px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224, 118, 88, 0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180, 180, 200, 0.06), transparent 50%);
  filter: blur(40px);
  pointer-events: none;
  z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none;
  z-index: -1;
}
@keyframes drift {
  0%   { transform: translate3d(0,0,0); }
  100% { transform: translate3d(-22px, 14px, 0); }
}

.page {
  max-width: 1100px;
  margin: 0 auto;
}

/* ===== Page title ===== */
.dash-title {
  margin: 0 0 18px;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}
@media (max-width: 480px) { .dash-title { font-size: 22px; } }

/* ===== Bento hub grid ===== */
.bento-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 168px;
  grid-auto-flow: dense;
  gap: 14px;
}

.bento-tile {
  position: relative;
  display: flex;
  flex-direction: column;
  border-radius: 18px;
  padding: 20px;
  text-decoration: none;
  color: inherit;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.45);
  overflow: hidden;
  transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1),
              border-color 0.3s ease,
              box-shadow 0.3s ease;
}
.bento-tile:hover,
.bento-tile:focus-visible {
  transform: translateY(-3px);
  border-color: var(--accent);
  box-shadow: 0 18px 48px rgba(0,0,0,0.5);
}

.bento-tile.big  { grid-column: span 2; grid-row: span 2; }
.bento-tile.wide { grid-column: span 2; }

.bento-num {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--text-tertiary);
}

.bento-emoji {
  position: absolute; top: 18px; right: 20px;
  font-size: 26px; line-height: 1;
  filter: drop-shadow(0 0 12px color-mix(in srgb, var(--accent) 65%, transparent));
}

.bento-spacer { flex: 1; }

.bento-title {
  font-size: 17px; font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text-primary);
  margin-top: 10px;
}
.bento-tile.big .bento-title { font-size: 21px; }

.bento-footer {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
  margin-top: 8px;
}

.bento-sub {
  font-size: 12px;
  color: var(--text-secondary);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.bento-arrow {
  flex-shrink: 0;
  font-size: 16px;
  color: var(--accent);
  transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
}
.bento-tile:hover .bento-arrow,
.bento-tile:focus-visible .bento-arrow {
  transform: translateX(4px);
}

@media (max-width: 720px) {
  .bento-grid { grid-template-columns: repeat(2, 1fr); }
  .bento-tile.big { grid-row: span 1; }
}
@media (max-width: 440px) {
  .bento-grid { grid-template-columns: 1fr; }
  .bento-tile.big,
  .bento-tile.wide { grid-column: span 1; }
}
</style>
</head>
<body>
<div class="page">

  <h1 class="dash-title">Dashboard</h1>

  <div class="bento-grid">

    <a class="bento-tile big" href="main.html" style="--accent:#6BE3A4">
      <span class="bento-num">·01</span>
      <span class="bento-emoji">🏠</span>
      <span class="bento-spacer"></span>
      <span class="bento-title">Main</span>
      <span class="bento-footer">
        <span class="bento-sub">Goals &amp; daily plan</span>
        <span class="bento-arrow">→</span>
      </span>
    </a>

    <a class="bento-tile wide" href="gym.html" style="--accent:#7DD3FC">
      <span class="bento-num">·02</span>
      <span class="bento-emoji">💪</span>
      <span class="bento-spacer"></span>
      <span class="bento-title">Fitness</span>
      <span class="bento-footer">
        <span class="bento-sub">Workouts, splits, sessions</span>
        <span class="bento-arrow">→</span>
      </span>
    </a>

    <a class="bento-tile" href="health.html" style="--accent:#A7F3D0">
      <span class="bento-num">·03</span>
      <span class="bento-emoji">💊</span>
      <span class="bento-spacer"></span>
      <span class="bento-title">Health</span>
      <span class="bento-footer">
        <span class="bento-sub">Supplements &amp; vitals</span>
        <span class="bento-arrow">→</span>
      </span>
    </a>

    <a class="bento-tile" href="po-water.html" style="--accent:#60A5FA">
      <span class="bento-num">·04</span>
      <span class="bento-emoji">💧</span>
      <span class="bento-spacer"></span>
      <span class="bento-title">Water</span>
      <span class="bento-footer">
        <span class="bento-sub">Hydration</span>
        <span class="bento-arrow">→</span>
      </span>
    </a>

    <a class="bento-tile wide" href="finance.html" style="--accent:#F2C063">
      <span class="bento-num">·05</span>
      <span class="bento-emoji">📊</span>
      <span class="bento-spacer"></span>
      <span class="bento-title">Finance</span>
      <span class="bento-footer">
        <span class="bento-sub">Net worth &amp; spending</span>
        <span class="bento-arrow">→</span>
      </span>
    </a>

  </div>

</div>
</body>
</html>
